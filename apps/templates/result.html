<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Import Result</title>
</head>
<body>
  <h1>Import Result</h1>
  <p>Created: {{ result.created }}</p>
  {% if result.updated is not None %}
  <p>Updated: {{ result.updated }}</p>
  {% endif %}
  {% if result.errors %}
    <ul>
      {% for error in result.errors %}
      <li>{{ error }}</li>
      {% endfor %}
    </ul>
  {% else %}
    <p>No errors.</p>
  {% endif %}
</body>
</html>
